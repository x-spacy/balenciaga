networks:
  nest-template:

services:
  postgres:
    image: postgres:18.1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
    networks:
      - nest-template
    volumes:
      - postgres:/var/lib/postgresql/data
  redis:
    image: bitnami/redis:sha256-d92ea14fbdd2fd0e0e3a5f3e657261ba2bd63a1d69d1eda32b1cc3ae6451bc1f
    environment:
      REDIS_PASSWORD: redis
    ports:
      - 6379:6379
    networks:
      - nest-template
    volumes:
      - redis:/bitnami/redis/data

volumes:
  postgres:
  redis:
